version: "3.9"

# ── Icelandic Tutor — garuda deployment ───────────────────────────────────────
# All containers run on garuda (Arch, RTX 5080)
# Configure LLM_PROVIDER, OLLAMA_BASE_URL, OLLAMA_MODEL etc. in .env
# Access the app at https://garuda:8843

services:

  # ─── Whisper STT + Pronunciation Scoring ──────────────────────────────────
  # Both /transcribe and /score endpoints share one model load in GPU VRAM.
  whisper:
    build: ./whisper-service
    container_name: icelandic_whisper
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - whisper_models:/root/.cache/huggingface
    environment:
      - MODEL_SIZE=${WHISPER_MODEL:-large-v3-turbo}
      - DEVICE=${WHISPER_DEVICE:-cuda}
      - COMPUTE_TYPE=${WHISPER_COMPUTE:-float16}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://c220-fedora:4318
    extra_hosts:
      - "c220-fedora:${C220_IP:-192.168.1.50}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  # ─── TTS (Piper) ──────────────────────────────────────────────────────────
  tts:
    build: ./tts-service
    container_name: icelandic_tts
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - tts_models:/app/models
    environment:
      - VOICE_MODEL=${TTS_VOICE:-is_IS-bui-medium}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://c220-fedora:4318
    extra_hosts:
      - "c220-fedora:${C220_IP:-192.168.1.50}"

  # ─── RAG Service ──────────────────────────────────────────────────────────
  rag:
    build: ./rag-service
    container_name: icelandic_rag
    restart: unless-stopped
    ports:
      - "8004:8004"
    volumes:
      - rag_data:/data
      - ./rag-service/pdfs:/app/pdfs
    environment:
      - PDFS_DIR=/app/pdfs
      - CHROMA_DIR=/data/chroma
      - EMBED_MODEL=intfloat/multilingual-e5-small
      - CHUNK_SIZE=400
      - CHUNK_OVERLAP=60
      - TOP_K=3
      - ANONYMIZED_TELEMETRY=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://c220-fedora:4318
    extra_hosts:
      - "c220-fedora:${C220_IP:-192.168.1.50}"

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: icelandic_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://spark-f73a:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:32b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - WHISPER_URL=http://whisper:8001
      - TTS_URL=http://tts:8002
      - PRONUN_URL=http://whisper:8001
      - RAG_URL=http://rag:8004
      - DB_PATH=/data/tutor.db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://c220-fedora:4318
    volumes:
      - tutor_data:/data
    depends_on:
      - whisper
      - tts
      - rag
    extra_hosts:
      - "garuda:host-gateway"
      - "spark-f73a:${SPARK_IP:-192.168.1.100}"
      - "c220-fedora:${C220_IP:-192.168.1.50}"

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_OTEL_COLLECTOR_URL: ${OTEL_COLLECTOR_URL:-}
    container_name: icelandic_frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ─── Nginx ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: icelandic_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8843:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  whisper_models:   # Whisper model weights — persists across rebuilds
  tts_models:       # Piper Icelandic voice model
  tutor_data:       # SQLite database (sessions, progress, flashcards)
  rag_data:         # ChromaDB vector store
