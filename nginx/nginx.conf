events { worker_connections 1024; }

http {
  # Use Docker's internal DNS so upstream IPs are re-resolved after container rebuilds
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream frontend    { server frontend:80; }
  upstream backend     { server backend:8000; }
  upstream whisper     { server whisper:8001; }
  upstream tts         { server tts:8002; }
  upstream rag         { server rag:8004; }

  # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS ──────────────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    client_max_body_size 50M;

    ssl_certificate     /etc/nginx/certs/garuda.crt;
    ssl_certificate_key /etc/nginx/certs/garuda.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /api/ {
      proxy_pass         http://backend/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
      proxy_buffering    off;
    }
    location /whisper/ {
      proxy_pass         http://whisper/;
      proxy_set_header   Host $host;
      proxy_read_timeout 60s;
    }
    location /tts/ {
      proxy_pass         http://tts/;
      proxy_set_header   Host $host;
      proxy_read_timeout 30s;
    }
    location /pronunciation/ {
      proxy_pass         http://whisper/;
      proxy_set_header   Host $host;
      proxy_read_timeout 60s;
    }
    location /rag/ {
      proxy_pass         http://rag/;
      proxy_set_header   Host $host;
      proxy_read_timeout 120s;
    }
    location / {
      proxy_pass         http://frontend/;
      proxy_set_header   Host $host;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
    }
  }
}
